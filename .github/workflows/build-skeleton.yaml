name: Build Skeleton
on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Target tag for re-upload'
        required: true
        default: ''
      admin:
        description: 'Create also a package with Admin'
        required: false
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Tag
        run: echo "SKELETON_VERSION=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      # 1. Build latest (2.0) FIRST, using the fork (PHP 8.3) since
      #    Grav 1.8+ requires it. Plain/unversioned filename for now.
      - name: Generate Skeleton Packages (latest / 2.0)
        uses: paulhibbitts/skeleton-builder@main
        with:
          version: 'latest'
          admin: ${{ github.event.inputs.admin || false }}
          exclude: README.md
          filename_version: false

      # 2. Rename the 2.0 output with a "-2" suffix, then move it
      #    OUT of dist/ entirely -- the next build step needs to
      #    create dist/ fresh, and will fail if it already exists.
      - name: Stash renamed 2.0 build output
        run: |
          mkdir -p dist-2
          cd dist
          for f in *.zip; do
            sudo mv "$f" "../dist-2/${f%.zip}-2.zip"
          done
          cd ..
          sudo rmdir dist

      # 3. Build the pinned 1.7.53 version LAST, using the original
      #    upstream action (PHP 7.4, proven stable for this version).
      #    Plain/unversioned filename matches your existing convention.
      - name: Generate Skeleton Packages (1.7.53)
        uses: getgrav/skeleton-builder@v1
        with:
          version: '1.7.53'
          admin: ${{ github.event.inputs.admin || false }}
          exclude: README.md
          filename_version: false

      # 4. Move the stashed 2.0 files back into dist/ alongside
      #    the freshly built 1.7.53 files.
      - name: Merge package outputs
        run: sudo mv dist-2/*.zip dist/

      - name: Upload packages to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.SKELETON_VERSION }}
          file: dist/*.zip
          overwrite: true
          file_glob: true
