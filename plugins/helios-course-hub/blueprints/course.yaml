title: Course
'@extends':
    type: default
    context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: PLUGIN_ADMIN.CONTENT
          fields:
            content:
              ordering@: 100
            header.media_order:
              ordering@: 101
            header.description:
              type: textarea
              label: Description
              toggleable: true
              rows: 3
              placeholder: A short description for this course
              help: 'Short description shown on the course card on the Courses homepage.'
            header.icon:
              type: text
              label: Icon
              toggleable: true
              placeholder: 'tabler/bulb.svg'
              help: 'Tabler icon path for this course (e.g. tabler/bulb.svg). Used in course cards and the sidebar course label.'
            header.image:
              type: pagemediaselect
              label: Card Image
              toggleable: true
              help: 'Image from this page''s media folder to display at the top of the course card on the Courses homepage.'
            header.instructor:
              type: text
              label: Instructor(s)
              toggleable: true
              placeholder: 'e.g. Jane Smith or Jane Smith & John Doe'
              help: 'Instructor name(s) shown below the description on the course card on the Courses homepage.'
            header.badge_label:
              type: text
              label: Badge Label
              toggleable: true
              placeholder: 'e.g. Coming Soon, New, Archived'
              help: 'Short status badge displayed on the course card below the title. Leave empty to show no badge.'
            header.badge_color:
              type: select
              label: Badge Color
              toggleable: true
              default: default
              options:
                default: Default
                blue: Blue
                green: Green
                yellow: Yellow
                red: Red
                purple: Purple
                plain: Plain
              help: 'Badge color. Matches Helios doc-badge color options.'
